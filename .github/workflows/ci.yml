name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build # before npm test — test/cli.test.ts exercises dist/cli.js
      - run: npm run lint
      - run: npm test

  publish:
    # Release on merge to main: bump the patch version, push it back, then publish.
    # NPM_TOKEN comes from the repo's Actions secrets.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: publish
      cancel-in-progress: false # a queued release must never be silently dropped
    permissions:
      contents: write # push the version bump commit/tag
      id-token: write # npm provenance attestation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # concurrency above only prevents *simultaneous* runs — a run that
          # was queued behind another still started from a checkout that may
          # have gone stale while it waited, so re-sync immediately before
          # bumping the version.
          git pull --rebase origin main
          npm version patch -m "chore(release): %s [skip ci]"
          git push origin HEAD:main --follow-tags
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
